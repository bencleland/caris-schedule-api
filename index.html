<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARIS Meeting Room Display</title>
  <link rel="stylesheet" href="style.css?v=100" />
</head>

<body>
  <div id="meetingTitle"></div>
  <div id="guestAttendees"></div>
  <div id="carisAttendees"></div>
  <div id="clockTime"></div>
  <div id="clockDate"></div>
  <img id="statusImage" src="" alt="Status" />
  <div id="nextTime"></div>
  <div id="nextTitle"></div>

  <div id="debug" style="position:absolute;left:20px;bottom:20px;background:yellow;color:black;font-size:18px;z-index:9999;padding:10px;max-width:1200px;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sheet = params.get("sheet") || "Current Meeting Room 1";

    const backgrounds = {
      "Current Meeting Room 1": "MEETING ROOM 1.png",
      "Current Meeting Room 2": "MEETING ROOM 2.png",
      "Current Meeting Room 3": "MEETING ROOM 3.png",
      "Current Pod 1": "POD 1.png",
      "Current Pod 2": "POD 2.png"
    };

    if (backgrounds[sheet]) {
      document.body.style.backgroundImage = `url("${backgrounds[sheet]}?v=100")`;
    }

    async function loadData() {
      const apiUrl =
        "/.netlify/functions/schedule?sheet=" +
        encodeURIComponent(sheet) +
        "&t=" +
        Date.now();

      try {
        const response = await fetch(apiUrl, { cache: "no-store" });
        const data = await response.json();
        const room = Array.isArray(data) ? data[0] : data;

        document.getElementById("debug").innerText =
          "Sheet: " + sheet +
          " | API: " + apiUrl +
          " | Time: " + new Date().toLocaleTimeString() +
          " | Title: " + (room && room["Meeting Title"] ? room["Meeting Title"] : "NO TITLE FOUND");

        if (!room) return;

        document.getElementById("meetingTitle").innerText = room["Meeting Title"] || "";
        document.getElementById("guestAttendees").innerText = room["Guest Attendees"] || "";
        document.getElementById("carisAttendees").innerText = room["Caris Attendees"] || "";
        document.getElementById("nextTime").innerText = room["Next Meeting Start Display"] || room["Next Meeting Start"] || "";
        document.getElementById("nextTitle").innerText = room["Next Meeting Title"] || "";

        if (room["Status Image"]) {
          document.getElementById("statusImage").src =
            room["Status Image"] + (room["Status Image"].includes("?") ? "&" : "?") + "t=" + Date.now();
        }
      } catch (err) {
        document.getElementById("debug").innerText =
          "ERROR: " + err.message + " | " + new Date().toLocaleTimeString();
      }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clockTime").innerText =
        now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });

      document.getElementById("clockDate").innerText =
        now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
    }

    loadData();
    updateClock();
    setInterval(loadData, 5000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
