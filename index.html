<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARIS Meeting Room Display</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="style.css?v=101" />
</head>

<body>
  <div id="meetingTitle"></div>
  <div id="guestAttendees"></div>
  <div id="carisAttendees"></div>

  <div id="clockTime"></div>
  <div id="clockDate"></div>

  <img id="statusImage" src="" alt="Status" />

  <div id="nextTime"></div>
  <div id="nextTitle"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sheet = params.get("sheet") || "Current Meeting Room 1";

    const backgrounds = {
      "Current Meeting Room 1": "MEETING ROOM 1.png",
      "Current Meeting Room 2": "MEETING ROOM 2.png",
      "Current Meeting Room 3": "MEETING ROOM 3.png",
      "Current Pod 1": "POD 1.png",
      "Current Pod 2": "POD 2.png"
    };

    if (backgrounds[sheet]) {
      document.body.style.backgroundImage = `url("${backgrounds[sheet]}?v=101")`;
    }

    async function loadData() {
      try {
        const apiUrl =
          "/.netlify/functions/schedule?sheet=" +
          encodeURIComponent(sheet) +
          "&t=" +
          Date.now();

        const response = await fetch(apiUrl, {
          method: "GET",
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache, no-store, must-revalidate",
            "Pragma": "no-cache",
            "Expires": "0"
          }
        });

        const data = await response.json();
        const room = Array.isArray(data) ? data[0] : data;

        if (!room) return;

        document.getElementById("meetingTitle").innerText = room["Meeting Title"] || "";
        document.getElementById("guestAttendees").innerText = room["Guest Attendees"] || "";
        document.getElementById("carisAttendees").innerText = room["Caris Attendees"] || "";
        document.getElementById("nextTime").innerText = room["Next Meeting Start Display"] || room["Next Meeting Start"] || "";
        document.getElementById("nextTitle").innerText = room["Next Meeting Title"] || "";

        const statusImage = document.getElementById("statusImage");

        if (room["Status Image"]) {
          statusImage.src =
            room["Status Image"] +
            (room["Status Image"].includes("?") ? "&" : "?") +
            "t=" +
            Date.now();

          statusImage.style.display = "block";
        } else {
          statusImage.style.display = "none";
        }

      } catch (err) {
        console.error("Load error:", err);
      }
    }

    function updateClock() {
      const now = new Date();

      document.getElementById("clockTime").innerText =
        now.toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit"
        });

      document.getElementById("clockDate").innerText =
        now.toLocaleDateString([], {
          weekday: "long",
          month: "long",
          day: "numeric"
        });
    }

    loadData();
    updateClock();

    setInterval(loadData, 5000);
    setInterval(updateClock, 1000);

    // Safety reload every 2 minutes
    setInterval(() => {
      window.location.reload();
    }, 120000);
  </script>
</body>
</html>
