<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CARIS Display Debug</title>
  <link rel="stylesheet" href="style.css?v=200">
</head>
<body>
  <div id="meetingTitle"></div>
  <div id="guestAttendees"></div>
  <div id="carisAttendees"></div>
  <div id="clockTime"></div>
  <div id="clockDate"></div>
  <img id="statusImage" src="">
  <div id="nextTime"></div>
  <div id="nextTitle"></div>

  <div id="debug" style="
    position:absolute;
    left:20px;
    bottom:20px;
    background:yellow;
    color:black;
    padding:12px;
    font-size:18px;
    z-index:9999;
    max-width:1600px;
  "></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sheet = params.get("sheet") || "Current Meeting Room 1";

    const backgrounds = {
      "Current Meeting Room 1": "MEETING ROOM 1.png",
      "Current Meeting Room 2": "MEETING ROOM 2.png",
      "Current Meeting Room 3": "MEETING ROOM 3.png",
      "Current Pod 1": "POD 1.png",
      "Current Pod 2": "POD 2.png"
    };

    document.body.style.backgroundImage = `url("${backgrounds[sheet] || "MEETING ROOM 1.png"}")`;

    async function loadData() {
      const apiUrl =
        "https://bespoke-crepe-e34f23.netlify.app/.netlify/functions/schedule?sheet=" +
        encodeURIComponent(sheet) +
        "&t=" +
        Date.now();

      try {
        const response = await fetch(apiUrl, { cache: "no-store" });
        const data = await response.json();
        const room = Array.isArray(data) ? data[0] : data;

        document.getElementById("debug").innerText =
          "Sheet: " + sheet +
          " | API Title: " + (room?.["Meeting Title"] || "NO TITLE") +
          " | Updated: " + new Date().toLocaleTimeString();

        if (!room) return;

        meetingTitle.innerText = room["Meeting Title"] || "";
        guestAttendees.innerText = room["Guest Attendees"] || "";
        carisAttendees.innerText = room["Caris Attendees"] || "";
        nextTime.innerText = room["Next Meeting Start Display"] || room["Next Meeting Start"] || "";
        nextTitle.innerText = room["Next Meeting Title"] || "";

        if (room["Status Image"]) {
          statusImage.src = room["Status Image"];
          statusImage.style.display = "block";
        } else {
          statusImage.style.display = "none";
        }

      } catch (err) {
        document.getElementById("debug").innerText = "ERROR: " + err.message;
      }
    }

    function updateClock() {
      const now = new Date();
      clockTime.innerText = now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
      clockDate.innerText = now.toLocaleDateString([], {
        weekday: "long",
        month: "long",
        day: "numeric"
      });
    }

    loadData();
    updateClock();
    setInterval(loadData, 5000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
