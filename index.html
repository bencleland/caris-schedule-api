<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CARIS Meeting Room Display</title>
  <link rel="stylesheet" href="style.css?v=401">
</head>

<body>
  <div id="meetingTitle"></div>
  <div id="guestAttendees"></div>
  <div id="carisAttendees"></div>
  <div id="clockTime"></div>
  <div id="clockDate"></div>
  <img id="statusImage" src="">
  <div id="nextTime"></div>
  <div id="nextTitle"></div>

  <div id="debug" style="position:absolute;left:20px;bottom:20px;background:yellow;color:black;z-index:99999;font-size:18px;padding:10px;max-width:1500px;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const roomName =
      params.get("room") ||
      params.get("sheet")?.replace("Current ", "") ||
      "Meeting Room 1";

    const backgrounds = {
      "Meeting Room 1": "MEETING ROOM 1.png",
      "Meeting Room 2": "MEETING ROOM 2.png",
      "Meeting Room 3": "MEETING ROOM 3.png",
      "Pod 1": "POD 1.png",
      "Pod 2": "POD 2.png"
    };

    document.body.style.backgroundImage =
      `url("${backgrounds[roomName] || "MEETING ROOM 1.png"}?v=401")`;

    const apiUrl =
      "https://bespoke-crepe-e34f23.netlify.app/.netlify/functions/schedule?sheet=Current%20Meeting%20Room%201";

    function clean(value) {
      return (value || "").trim();
    }

    function parseSheetDate(value) {
      if (!value) return null;

      const match = value.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (!match) return null;

      const month = parseInt(match[1], 10) - 1;
      const day = parseInt(match[2], 10);
      const year = parseInt(match[3], 10);
      const hour = parseInt(match[4], 10);
      const minute = parseInt(match[5], 10);
      const second = parseInt(match[6] || "0", 10);

      return new Date(year, month, day, hour, minute, second);
    }

    function getActiveMeeting(rows) {
      const now = new Date();

      const roomRows = rows.filter(row => clean(row["Room Name"]) === roomName);

      const active = roomRows.find(row => {
        const start = parseSheetDate(row["Start Time"]);
        const end = parseSheetDate(row["End Time"]);
        return start && end && now >= start && now < end;
      });

      const firstFew = roomRows.slice(0, 3).map(r =>
        `${clean(r["Meeting Title"])} | ${clean(r["Start Time"])} - ${clean(r["End Time"])}`
      ).join(" || ");

      debug.innerText =
        `Room: ${roomName} | Browser now: ${now.toLocaleString()} | Room rows: ${roomRows.length} | Active: ${active ? clean(active["Meeting Title"]) : "NONE"} | Sample: ${firstFew}`;

      return active;
    }

    function getNextMeeting(rows) {
      const now = new Date();

      return rows
        .filter(row => clean(row["Room Name"]) === roomName)
        .map(row => ({
          row,
          start: parseSheetDate(row["Start Time"])
        }))
        .filter(item => item.start && item.start > now)
        .sort((a, b) => a.start - b.start)[0]?.row || null;
    }

    function setDisplay(room, rows) {
      const next = getNextMeeting(rows);

      if (!room) {
        meetingTitle.innerText = "";
        guestAttendees.innerText = "";
        carisAttendees.innerText = "";
        nextTime.innerText = next ? clean(next["Next Meeting Start Display"]) || clean(next["Start Time"]) : "";
        nextTitle.innerText = next ? clean(next["Meeting Title"]) : "";
        statusImage.style.display = "none";
        return;
      }

      meetingTitle.innerText = clean(room["Meeting Title"]);
      guestAttendees.innerText = clean(room["Guest Attendees"]);
      carisAttendees.innerText = clean(room["Caris Attendees"]);
      nextTime.innerText = clean(room["Next Meeting Start Display"]) || "";
      nextTitle.innerText = clean(room["Next Meeting Title"]) || "";

      if (room["Status Image"]) {
        statusImage.src =
          clean(room["Status Image"]) +
          (room["Status Image"].includes("?") ? "&" : "?") +
          "t=" +
          Date.now();
        statusImage.style.display = "block";
      } else {
        statusImage.style.display = "none";
      }
    }

    async function loadData() {
      try {
        const response = await fetch(apiUrl + "&t=" + Date.now(), {
          cache: "no-store"
        });

        const data = await response.json();
        const rows = Array.isArray(data) ? data : data.result || [];

        const activeMeeting = getActiveMeeting(rows);
        setDisplay(activeMeeting, rows);

      } catch (err) {
        debug.innerText = "ERROR: " + err.message;
        console.error("Data load error:", err);
      }
    }

    function updateClock() {
      const now = new Date();

      clockTime.innerText = now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });

      clockDate.innerText = now.toLocaleDateString([], {
        weekday: "long",
        month: "long",
        day: "numeric"
      });
    }

    loadData();
    updateClock();

    setInterval(loadData, 5000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
