<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CARIS Meeting Room Display</title>
  <link rel="stylesheet" href="style.css?v=600">
</head>

<body>
  <div id="meetingTitle"></div>
  <div id="guestAttendees"></div>
  <div id="carisAttendees"></div>
  <div id="clockTime"></div>
  <div id="clockDate"></div>
  <img id="statusImage" src="">
  <div id="nextTime"></div>
  <div id="nextTitle"></div>

  <div id="debug" style="position:absolute;left:20px;bottom:20px;background:yellow;color:black;z-index:99999;font-size:18px;padding:10px;max-width:1650px;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const roomName =
      params.get("room") ||
      params.get("sheet")?.replace("Current ", "") ||
      "Meeting Room 1";

    const backgrounds = {
      "Meeting Room 1": "MEETING ROOM 1.png",
      "Meeting Room 2": "MEETING ROOM 2.png",
      "Meeting Room 3": "MEETING ROOM 3.png",
      "Pod 1": "POD 1.png",
      "Pod 2": "POD 2.png"
    };

    document.body.style.backgroundImage =
      `url("${backgrounds[roomName] || "MEETING ROOM 1.png"}?v=600")`;

    const apiUrl =
      "https://bespoke-crepe-e34f23.netlify.app/.netlify/functions/schedule?sheet=Current%20Meeting%20Room%201";

    function clean(value) {
      return (value || "").trim();
    }

    function flattenData(data) {
      if (Array.isArray(data?.[0])) return data[0];
      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.result)) return data.result;
      return [];
    }

    function parseSheetDate(value) {
      if (!value) return null;
      value = value.trim();

      let match = value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (match) {
        return new Date(
          parseInt(match[3], 10),
          parseInt(match[1], 10) - 1,
          parseInt(match[2], 10),
          parseInt(match[4], 10),
          parseInt(match[5], 10),
          parseInt(match[6] || "0", 10)
        );
      }

      match = value.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (match) {
        const now = new Date();
        let hour = parseInt(match[1], 10);
        const minute = parseInt(match[2], 10);
        const ampm = match[3].toUpperCase();

        if (ampm === "PM" && hour !== 12) hour += 12;
        if (ampm === "AM" && hour === 12) hour = 0;

        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0);
      }

      return null;
    }

    function getActiveMeeting(rows) {
      const now = new Date();

      const roomRows = rows.filter(row => clean(row["Room Name"]) === roomName);

      const activeByTime = roomRows
        .map(row => ({
          row,
          title: clean(row["Meeting Title"]),
          startRaw: clean(row["Start Time"]),
          endRaw: clean(row["End Time"]),
          start: parseSheetDate(row["Start Time"]),
          end: parseSheetDate(row["End Time"])
        }))
        .filter(item => item.start && item.end && now >= item.start && now < item.end)
        .sort((a, b) => b.start - a.start);

      const sample = roomRows
        .slice(0, 8)
        .map(r => `${clean(r["Meeting Title"])} [${clean(r["Start Time"])}-${clean(r["End Time"])}]`)
        .join(" || ");

      debug.innerText =
        `Room: ${roomName} | Now: ${now.toLocaleString()} | Rows: ${roomRows.length} | Matches: ${activeByTime.length} | Active: ${activeByTime[0]?.title || "NONE"} | Sample: ${sample}`;

      return activeByTime.length ? activeByTime[0].row : null;
    }

    function getNextMeeting(rows) {
      const now = new Date();

      return rows
        .filter(row => clean(row["Room Name"]) === roomName)
        .map(row => ({
          row,
          start: parseSheetDate(row["Start Time"])
        }))
        .filter(item => item.start && item.start > now)
        .sort((a, b) => a.start - b.start)[0]?.row || null;
    }

    function setDisplay(room, rows) {
      const next = getNextMeeting(rows);

      if (!room) {
        meetingTitle.innerText = "";
        guestAttendees.innerText = "";
        carisAttendees.innerText = "";
        nextTime.innerText = next ? clean(next["Start Time"]) : "";
        nextTitle.innerText = next ? clean(next["Meeting Title"]) : "";
        statusImage.style.display = "none";
        return;
      }

      meetingTitle.innerText = clean(room["Meeting Title"]);
      guestAttendees.innerText = clean(room["Guest Attendees"]);
      carisAttendees.innerText = clean(room["Caris Attendees"]);
      nextTime.innerText = clean(room["Next Meeting Start Display"]) || "";
      nextTitle.innerText = clean(room["Next Meeting Title"]) || "";

      if (room["Status Image"]) {
        statusImage.src =
          clean(room["Status Image"]) +
          (room["Status Image"].includes("?") ? "&" : "?") +
          "t=" +
          Date.now();
        statusImage.style.display = "block";
      } else {
        statusImage.style.display = "none";
      }
    }

    async function loadData() {
      try {
        const response = await fetch(apiUrl + "&t=" + Date.now(), {
          cache: "no-store"
        });

        const data = await response.json();
        const rows = flattenData(data);

        const activeMeeting = getActiveMeeting(rows);
        setDisplay(activeMeeting, rows);

      } catch (err) {
        debug.innerText = "ERROR: " + err.message;
        console.error("Data load error:", err);
      }
    }

    function updateClock() {
      const now = new Date();

      clockTime.innerText = now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });

      clockDate.innerText = now.toLocaleDateString([], {
        weekday: "long",
        month: "long",
        day: "numeric"
      });
    }

    loadData();
    updateClock();

    setInterval(loadData, 5000);
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
